<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap');

:root{
  --ink:#532C3B;
  --ink-soft:#A6798C;
  --bg:#FCEAF0;
  --surface:#FFFFFF;
  --line:#F6D9E3;
  --brand:#E0628B;
  --brand-deep:#B8456A;
  --p1:#EC6F91;       /* Twin A accent - rose pink */
  --p1-deep:#C24768;
  --p1-light:#FFD9E4;
  --p2:#8C7FC2;        /* Twin B accent - soft lavender */
  --p2-deep:#675999;
  --p2-light:#DCD6F0;
  --danger:#D9637A;
}

*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0; height:100%;}

#hydration-app{
  font-family:'Inter',sans-serif;
  color:var(--ink);
  background:var(--bg);
  height:100dvh;
  height:100vh;
  max-width:430px;
  margin:0 auto;
  padding:env(safe-area-inset-top,18px) 0 calc(env(safe-area-inset-bottom,18px) + 12px);
  position:relative;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.h-title-row, .sync-line, .segment{
  padding-left:16px;
  padding-right:16px;
  flex-shrink:0;
}

/* Vertical dot slider nav, pinned to the right edge */
.dots{
  position:absolute;
  right:7px;
  top:50%;
  transform:translateY(-50%);
  display:flex;
  flex-direction:column;
  gap:8px;
  z-index:5;
}
.dot-btn{
  border:none;
  background:var(--line);
  width:8px; height:8px;
  border-radius:50%;
  padding:0;
  cursor:pointer;
  transition:background .2s, height .2s;
}
.dot-btn.active{
  background:var(--brand);
  height:22px;
  width:8px;
  border-radius:5px;
}

/* Swipeable vertical pager */
.pager{
  display:flex;
  flex-direction:column;
  overflow-y:auto;
  overflow-x:hidden;
  scroll-snap-type:y mandatory;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  flex:1 1 auto;
}
.pager::-webkit-scrollbar{display:none;}
.page{
  flex:0 0 auto;
  scroll-snap-align:start;
  scroll-snap-stop:always;
  padding:14px 28px 28px 16px;
  min-height:100%;
  box-sizing:border-box;
}
.page-title{
  font-family:'Outfit',sans-serif;
  font-weight:700;
  font-size:15px;
  color:var(--ink-soft);
  margin:0 2px 12px;
}

.h-title-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin:6px 2px 2px;
  gap:8px;
}
.h-title{
  font-family:'Outfit',sans-serif;
  font-weight:800;
  font-size:25px;
  letter-spacing:-0.02em;
}
.sync-line{
  font-size:12px;
  font-weight:500;
  color:var(--ink-soft);
  margin:0 2px 10px;
}

.lang-select{
  border:1.5px solid var(--line);
  background:var(--surface);
  border-radius:10px;
  padding:6px 9px;
  font-family:'Inter',sans-serif;
  font-size:12.5px;
  font-weight:600;
  color:var(--ink);
  cursor:pointer;
  flex-shrink:0;
}
.lang-select:focus{outline:2px solid var(--brand); outline-offset:1px;}

/* Add-to-home-screen banner */
.install-banner{
  display:flex;
  align-items:center;
  gap:10px;
  background:var(--surface);
  border-radius:14px;
  padding:10px 10px 10px 12px;
  margin:0 16px 14px;
  flex-shrink:0;
  box-shadow:0 1px 2px rgba(83,44,59,0.05);
}
.install-banner.hidden{display:none;}
.install-icon{
  width:18px; height:18px;
  color:var(--brand);
  flex-shrink:0;
}
.install-text{
  flex:1;
  font-size:12.5px;
  font-weight:500;
  color:var(--ink);
  line-height:1.35;
}
.install-close{
  border:none;
  background:#FBEEF2;
  color:var(--ink-soft);
  width:24px; height:24px;
  border-radius:8px;
  font-size:12px;
  cursor:pointer;
  flex-shrink:0;
}

/* Segmented toggle */
.segment{
  display:flex;
  background:var(--surface);
  border-radius:14px;
  padding:4px;
  gap:4px;
  box-shadow:0 1px 2px rgba(83,44,59,0.06), 0 8px 20px -10px rgba(83,44,59,0.12);
  margin-bottom:16px;
}
.segment button{
  flex:1;
  border:none;
  background:transparent;
  padding:10px 6px;
  border-radius:10px;
  font-family:'Inter',sans-serif;
  font-weight:600;
  font-size:14px;
  color:var(--ink-soft);
  cursor:pointer;
  transition:background .25s, color .25s;
}
.segment button.active.p1{background:var(--p1); color:#fff;}
.segment button.active.p2{background:var(--p2); color:#fff;}

/* Bottles row */
.glasses{
  display:flex;
  gap:12px;
  margin-bottom:18px;
}
.glass-card{
  flex:1;
  background:var(--surface);
  border-radius:20px;
  padding:14px 12px 12px;
  display:flex;
  flex-direction:column;
  align-items:center;
  box-shadow:0 1px 2px rgba(83,44,59,0.05), 0 10px 24px -14px rgba(83,44,59,0.18);
  transition:transform .25s, opacity .25s;
  opacity:0.6;
  transform:scale(0.96);
}
.glass-card.active{opacity:1; transform:scale(1);}

.glass-name-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  margin-bottom:10px;
}
.glass-name{
  font-size:13px;
  font-weight:600;
  color:var(--ink-soft);
  display:flex;
  align-items:center;
  gap:4px;
  cursor:pointer;
}
.glass-name .dot{width:7px;height:7px;border-radius:50%;display:inline-block;}
.glass-card.p1 .glass-name .dot{background:var(--p1);}
.glass-card.p2 .glass-name .dot{background:var(--p2);}
.glass-name svg{width:11px;height:11px;opacity:.5;}

.color-dot{
  width:14px; height:14px;
  border-radius:50%;
  border:1.5px solid rgba(83,44,59,0.12);
  padding:0;
  cursor:pointer;
  flex-shrink:0;
}
.glass-card.p1 .color-dot{background:var(--p1);}
.glass-card.p2 .color-dot{background:var(--p2);}

/* bottle shape: neck + body */
.bottle-wrap{position:relative; width:54px; height:96px; margin-bottom:10px;}
.bottle-neck{
  position:absolute; top:0; left:50%; transform:translateX(-50%);
  width:18px; height:12px;
  background:#FBF4F6;
  border:2.5px solid var(--line);
  border-bottom:none;
  border-radius:5px 5px 0 0;
}
.bottle-cap{
  position:absolute; top:-7px; left:50%; transform:translateX(-50%);
  width:24px; height:7px;
  background:var(--line);
  border-radius:3px;
}
.glass-shape{
  position:absolute;
  top:11px; left:0;
  width:54px;
  height:85px;
  border-radius:10px 10px 20px 20px;
  border:2.5px solid var(--line);
  overflow:hidden;
  background:#FBF4F6;
}
.glass-fill{
  position:absolute;
  bottom:0; left:0; right:0;
  height:0%;
  transition:height .5s cubic-bezier(.3,.9,.4,1);
}
.glass-card.p1 .glass-fill{background:linear-gradient(180deg,var(--p1-light),var(--p1));}
.glass-card.p2 .glass-fill{background:linear-gradient(180deg,var(--p2-light),var(--p2));}
.glass-fill::before{
  content:'';
  position:absolute;
  top:-3px; left:-10%;
  width:120%; height:8px;
  border-radius:50%;
  background:rgba(255,255,255,0.55);
  animation:bob 2.6s ease-in-out infinite;
}
@keyframes bob{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(2px);}
}

.glass-amount{font-family:'Outfit',sans-serif;font-weight:700;font-size:18px;}
.glass-goal{font-size:11px;color:var(--ink-soft);margin-top:1px;cursor:pointer;}

/* Quick add */
.section-label{
  font-size:12px;
  font-weight:600;
  color:var(--ink-soft);
  text-transform:uppercase;
  letter-spacing:.05em;
  margin:4px 2px 10px;
}
.quickgrid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-bottom:14px;
}
.qbtn{
  border:none;
  border-radius:16px;
  padding:14px 0;
  font-family:'Outfit',sans-serif;
  font-weight:700;
  font-size:16px;
  cursor:pointer;
  background:var(--surface);
  color:var(--ink);
  border:1.5px solid var(--line);
  transition:transform .12s, background .2s, color .2s, border-color .2s;
}
.qbtn:active{transform:scale(0.94);}
.qbtn.p1-active{border-color:var(--p1); color:var(--p1-deep);}
.qbtn.p2-active{border-color:var(--p2); color:var(--p2-deep);}
.qbtn span{display:block;font-size:10px;font-weight:500;color:var(--ink-soft);margin-top:1px;}

.customrow{
  display:flex;
  gap:8px;
  margin-bottom:24px;
}
.customrow input{
  flex:1;
  border:1.5px solid var(--line);
  border-radius:14px;
  padding:12px 14px;
  font-family:'Inter',sans-serif;
  font-size:15px;
  background:var(--surface);
  color:var(--ink);
  min-width:0;
}
.customrow input:focus{outline:2px solid var(--brand); outline-offset:1px;}
.customrow button{
  border:none;
  border-radius:14px;
  padding:0 20px;
  font-family:'Outfit',sans-serif;
  font-weight:700;
  font-size:14px;
  color:#fff;
  cursor:pointer;
}
.customrow button.p1{background:var(--p1);}
.customrow button.p2{background:var(--p2);}

/* Log */
.log-list{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-bottom:10px;
}
.log-row{
  background:var(--surface);
  border-radius:14px;
  padding:11px 12px;
  display:flex;
  align-items:center;
  gap:10px;
  box-shadow:0 1px 2px rgba(83,44,59,0.04);
}
.log-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.log-dot.p1{background:var(--p1);}
.log-dot.p2{background:var(--p2);}
.log-time{
  font-family:'JetBrains Mono',monospace;
  font-size:13px;
  color:var(--ink-soft);
  width:46px;
  flex-shrink:0;
}
.log-amount{
  font-family:'Outfit',sans-serif;
  font-weight:600;
  font-size:15px;
  flex:1;
}
.log-actions{display:flex; gap:6px;}
.icon-btn{
  border:none;
  background:#FBEEF2;
  width:32px;height:32px;
  border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  color:var(--ink-soft);
}
.icon-btn:active{transform:scale(0.92);}
.icon-btn.del{color:var(--danger);}

.empty-state{
  text-align:center;
  padding:30px 10px;
  color:var(--ink-soft);
  font-size:14px;
}

/* Edit sheet */
.sheet-overlay{
  position:fixed; inset:0;
  background:rgba(83,44,59,0.32);
  display:flex; align-items:flex-end; justify-content:center;
  z-index:50;
  opacity:0; pointer-events:none;
  transition:opacity .25s;
}
.sheet-overlay.show{opacity:1; pointer-events:auto;}
.sheet{
  width:100%; max-width:430px;
  background:var(--surface);
  border-radius:24px 24px 0 0;
  padding:20px 20px calc(env(safe-area-inset-bottom,18px) + 20px);
  transform:translateY(100%);
  transition:transform .3s cubic-bezier(.3,.9,.3,1);
}
.sheet-overlay.show .sheet{transform:translateY(0);}
.sheet-handle{width:36px;height:4px;background:var(--line);border-radius:3px;margin:0 auto 16px;}
.sheet h3{font-family:'Outfit',sans-serif;font-size:17px;margin:0 0 16px;}
.field-label{font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;}
.field{margin-bottom:14px;}
.field input{
  width:100%;
  border:1.5px solid var(--line);
  border-radius:12px;
  padding:11px 13px;
  font-family:'Inter',sans-serif;
  font-size:15px;
}
.field input:focus{outline:2px solid var(--brand); outline-offset:1px;}
.sheet-actions{display:flex; gap:10px; margin-top:6px;}
.sheet-actions button{
  flex:1;
  border:none;
  border-radius:13px;
  padding:13px 0;
  font-family:'Outfit',sans-serif;
  font-weight:700;
  font-size:14px;
  cursor:pointer;
}
.sheet-actions .save{background:var(--brand); color:#fff;}

.swatch-grid{

  grid-template-columns:repeat(3,1fr);
  gap:14px;
  margin-bottom:18px;
}
.swatch{

  aspect-ratio:1;
  border-radius:16px;
  border:3px solid transparent;
  cursor:pointer;
  position:relative;
}
.swatch.active{border-color:var(--ink);}
.swatch.active::after{
  content:'✓';
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  color:#fff;
  font-size:18px;
  font-weight:700;
  text-shadow:0 1px 2px rgba(0,0,0,0.25);
}

.sync-note{
  text-align:center;
  font-size:11px;
  color:var(--ink-soft);
  margin-top:6px;
}

  display:flex;
  align-items:center;
  justify-content:space-between;
  margin:4px 2px 10px;
}
.interval-row .section-label{margin:0;}
.interval-pills{
  display:flex;
  background:var(--surface);
  border-radius:11px;
  padding:3px;
  gap:2px;
  box-shadow:0 1px 2px rgba(83,44,59,0.05);
}

  border:none;
  background:transparent;
  padding:6px 9px;
  border-radius:8px;
  font-family:'JetBrains Mono',monospace;
  font-size:11.5px;
  font-weight:500;
  color:var(--ink-soft);
  cursor:pointer;
}
.interval-pills button.active{background:var(--brand); color:#fff;}

.date-select{
  border:none;
  background:var(--surface);
  border-radius:11px;
  padding:8px 10px;
  font-family:'JetBrains Mono',monospace;
  font-size:12px;
  font-weight:500;
  color:var(--ink);
  box-shadow:0 1px 2px rgba(83,44,59,0.05);
  -webkit-appearance:none;
  appearance:none;
  cursor:pointer;
}
.date-select:focus{outline:2px solid var(--brand); outline-offset:1px;}

/* Average per interval card */
.avg-card{
  display:flex;
  background:var(--surface);
  border-radius:16px;
  box-shadow:0 1px 2px rgba(83,44,59,0.05), 0 10px 24px -14px rgba(83,44,59,0.16);
  margin-bottom:18px;
  overflow:hidden;
}
.avg-stat{
  flex:1;
  padding:14px 10px;
  text-align:center;
  border-right:1px solid var(--line);
}
.avg-stat:last-child{border-right:none;}
.avg-stat .avg-name{
  font-size:12px;
  font-weight:600;
  color:var(--ink-soft);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:5px;
  margin-bottom:6px;
}
.avg-stat .avg-name .dot{width:6px;height:6px;border-radius:50%;}

.avg-stat.p2 .avg-name .dot{background:var(--p2);}
.avg-stat .avg-value{
  font-family:'Outfit',sans-serif;
  font-weight:700;
  font-size:21px;
}
.avg-stat .avg-value span{font-size:12px; font-weight:500; color:var(--ink-soft);}
.avg-stat .avg-sub{font-size:10.5px; color:var(--ink-soft); margin-top:2px;}

.pattern-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-bottom:22px;
}
.pattern-card{

  box-shadow:0 1px 2px rgba(83,44,59,0.04);

}
.pattern-stat{

  font-family:'Outfit',sans-serif;
  font-weight:600;
  font-size:12.5px;
  margin:2px 0;
}
.pattern-stat .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

.pattern-note{
  font-size:11px;
  color:var(--ink-soft);
  margin:-4px 2px 12px;
}

  // string into a real date/time value, which comes back from the API

  // These guard against that so "today" matching never silently breaks.
  function normalizeDateStr(val){
    if(typeof val !== 'string') return val;
    if(val.includes('T')) return val.slice(0,10);

  }
  function normalizeTimeStr(val){
    if(typeof val !== 'string') return val;

  // JSONP request — bypasses CORS entirely (a <script> tag isn't subject

  function jsonpRequest(params){
    return new Promise((resolve, reject)=>{
      const cbName = 'jsonp_cb_' + Date.now() + '_' + Math.floor(Math.random()*1e6);
      const qs = new URLSearchParams({...params, callback:cbName, t:Date.now()}).toString();
      const script = document.createElement('script');
      let timeoutId;
      const cleanup = ()=>{
        clearTimeout(timeoutId);
        delete window[cbName];
        script.remove();
      };
      window[cbName] = (data)=>{ cleanup(); resolve(data); };
      script.onerror = ()=>{ cleanup(); reject(new Error('script load error')); };

      script.src = GAS_URL + '?' + qs;
      document.body.appendChild(script);
    });
  }

        let entries = data.entries.map(e=>({
          ...e,
          amount:Number(e.amount),
          date:normalizeDateStr(e.date),
          time:normalizeTimeStr(e.time)
        }));
        // Re-apply any in-flight edits/deletes/adds so they don't flicker
        // away while their request is still on the wire.
        entries = entries.filter(e=> !pendingDeletes.has(e.id));
        entries = entries.map(e=> pendingEdits.has(e.id) ? {...e, ...pendingEdits.get(e.id)} : e);
        pendingAdds.forEach((entry, id)=>{
          if(!entries.find(e=>e.id===id)) entries.push(entry);
        });
        // Defensive: if the server suddenly returns fewer entries than we
        // already know about locally, and nothing is actually pending a
        // delete, treat it as a bad/partial read rather than trusting it —
        // a flaky fetch should never be allowed to erase saved data.
        const looksIncomplete = entries.length < state.entries.length && pendingDeletes.size===0;
        if(!looksIncomplete){
          state.entries = entries;
        }
      }
      if(data && data.names) state.names = data.names;
      if(data && data.goals) state.goals = {p1:Number(data.goals.p1)||700, p2:Number(data.goals.p2)||700};
      if(data && data.colors){
        state.colors = {
          p1: THEME_COLORS[data.colors.p1] ? data.colors.p1 : state.colors.p1,
          p2: THEME_COLORS[data.colors.p2] ? data.colors.p2 : state.colors.p2
        };
      }
      setSyncStatus(t('synced'));
    }catch(err){
      setSyncStatus(t('offline'));
    }
    applyColors();
    render();
  }

  // Periodically refresh so both parents see each other's entries
  setInterval(()=>{ loadAll(); }, 20000);

  async function apiAddEntry(entry){
    pendingAdds.set(entry.id, entry);
    try{
      setSyncStatus(t('saving'));
      await jsonpRequest({action:'add', id:entry.id, person:entry.person, amount:entry.amount, date:entry.date, time:entry.time});
      setSyncStatus(t('synced'));
    }catch(e){
      setSyncStatus(t('saveFailed'));
    }finally{
      await loadAll();
      pendingAdds.delete(entry.id);
    }
  }
  async function apiEditEntry(id, amount, time){
    pendingEdits.set(id, {amount, time});
    try{
      setSyncStatus(t('saving'));
      await jsonpRequest({action:'edit', id, amount, time});
      setSyncStatus(t('synced'));
    }catch(e){
      setSyncStatus(t('saveFailed'));
    }finally{
      await loadAll();
      pendingEdits.delete(id);
    }
  }
  async function apiDeleteEntry(id){
    pendingDeletes.add(id);
    try{
      setSyncStatus(t('saving'));
      await jsonpRequest({action:'delete', id});
      setSyncStatus(t('synced'));
    }catch(e){
      setSyncStatus(t('saveFailed'));
    }finally{
      await loadAll();
      pendingDeletes.delete(id);
    }
  }
  async function apiSetName(person, name){
    try{ await jsonpRequest({action:'setName', person, name}); }catch(e){}
  }
  async function apiSetGoal(person, goal){
    try{ await jsonpRequest({action:'setGoal', person, goal}); }catch(e){}
  }
  async function apiSetColor(person, color){
    try{ await jsonpRequest({action:'setColor', person, color}); }catch(e){}
  }

  function applyColors(){
    const root = document.getElementById('hydration-app');
    ['p1','p2'].forEach(p=>{
      const c = THEME_COLORS[state.colors[p]] || THEME_COLORS.pink;
      root.style.setProperty('--'+p, c.base);
      root.style.setProperty('--'+p+'-deep', c.deep);
      root.style.setProperty('--'+p+'-light', c.light);
    });
  }

  function todayEntries(){
    const t = todayStr();
    return state.entries.filter(e=>e.date===t);
  }
  function totalFor(person){
    return todayEntries().filter(e=>e.person===person).reduce((s,e)=>s+e.amount,0);
  }

  function renderSegment(){
    const seg = document.getElementById('segment');
    seg.innerHTML = `
      <button class="${state.active==='p1'?'active p1':''}" data-p="p1">${escapeHtml(state.names.p1)}</button>
      <button class="${state.active==='p2'?'active p2':''}" data-p="p2">${escapeHtml(state.names.p2)}</button>
    `;
    seg.querySelectorAll('button').forEach(b=>{
      b.addEventListener('click', ()=>{ state.active = b.dataset.p; render(); });
    });
  }

  function renderGlasses(){
    const wrap = document.getElementById('glasses');
    wrap.innerHTML = ['p1','p2'].map(p=>{
      const total = totalFor(p);
      const goal = state.goals[p];
      const pct = Math.max(0, Math.min(100, Math.round((total/goal)*100)));
      return `
        <div class="glass-card ${p} ${state.active===p?'active':''}" data-p="${p}">
          <div class="glass-name-row">
            <span class="glass-name" data-rename="${p}">${escapeHtml(state.names[p])} ${PENCIL_SVG}</span>
            <button class="color-dot" data-color-btn="${p}" aria-label="Choose colour"></button>
          </div>
          <div class="bottle-wrap">
            <div class="bottle-cap"></div>
            <div class="bottle-neck"></div>
            <div class="glass-shape"><div class="glass-fill" style="height:${pct}%"></div></div>
          </div>
          <div class="glass-amount">${total} ml</div>
        </div>
      `;
    }).join('');

    wrap.querySelectorAll('.glass-card').forEach(c=>{
      c.addEventListener('click', (ev)=>{
        if(ev.target.closest('[data-rename]') || ev.target.closest('[data-color-btn]')) return;
        state.active = c.dataset.p; render();
      });
    });
    wrap.querySelectorAll('[data-rename]').forEach(el=>{
      el.addEventListener('click', (ev)=>{
        ev.stopPropagation();
        const p = el.dataset.rename;
        const val = prompt(t('renamePrompt'), state.names[p]);
        if(val && val.trim()){ state.names[p] = val.trim().slice(0,20); apiSetName(p, state.names[p]); render(); }
      });
    });
    wrap.querySelectorAll('[data-color-btn]').forEach(el=>{
      el.addEventListener('click', (ev)=>{
        ev.stopPropagation();
        openColorSheet(el.dataset.colorBtn);
      });
    });
  }

  function renderQuickgrid(){
    document.getElementById('quickLabel').textContent = t('quickAddFor', {name: state.names[state.active]});
    const grid = document.getElementById('quickgrid');
    const cls = state.active==='p1' ? 'p1-active' : 'p2-active';
    grid.innerHTML = QUICK_AMOUNTS.map(a=>`<button class="qbtn ${cls}" data-amt="${a}">${a}<span>ml</span></button>`).join('');
    grid.querySelectorAll('.qbtn').forEach(b=>{
      b.addEventListener('click', ()=> addEntry(parseInt(b.dataset.amt,10)));
    });

    const addBtn = document.getElementById('customAddBtn');
    addBtn.className = state.active;
    addBtn.onclick = ()=>{
      const input = document.getElementById('customAmount');
      const val = parseInt(input.value,10);
      if(val && val>0){ addEntry(val); input.value=''; }
    };
  }

  function renderLog(){
    const list = document.getElementById('logList');
    const entries = todayEntries().slice().sort((a,b)=> b.time.localeCompare(a.time));
    if(entries.length===0){
      list.innerHTML = `<div class="empty-state">${t('noFeeds')}</div>`;
      return;
    }
    list.innerHTML = entries.map(e=>`
      <div class="log-row" data-id="${e.id}">
        <div class="log-dot ${e.person}"></div>
        <div class="log-time">${e.time}</div>
        <div class="log-amount">${e.amount} ml <span style="font-weight:400;color:var(--ink-soft);font-size:12px;">· ${escapeHtml(state.names[e.person])}</span></div>
        <div class="log-actions">
          <button class="icon-btn edit" aria-label="Edit">${EDIT_SVG}</button>
          <button class="icon-btn del" aria-label="Delete">${TRASH_SVG}</button>
        </div>
      </div>
    `).join('');

    list.querySelectorAll('.log-row').forEach(row=>{
      const id = row.dataset.id;
      row.querySelector('.edit').addEventListener('click', ()=> openEditSheet(id));
      row.querySelector('.del').addEventListener('click', ()=> {
        state.entries = state.entries.filter(e=>e.id!==id);
        apiDeleteEntry(id); render();
      });
    });
  }

  function blockLabel(i, interval){
    const startH = i*interval, endH = startH+interval;
    function fmt(h){
      const ampm = (h%24) < 12 ? 'AM':'PM';
      let hh = h%24;
      if(hh===0) hh=12; else if(hh>12) hh-=12;
      return hh+ampm;
    }
    if(interval===24) return 'Full day';
    return fmt(startH)+'–'+fmt(endH===24?0:endH);
  }

  function computeBlockTotals(date, interval){
    const numBlocks = 24/interval;
    const sums = {p1:Array(numBlocks).fill(0), p2:Array(numBlocks).fill(0)};
    state.entries.forEach(e=>{
      if(e.date !== date) return;
      const h = parseInt((e.time||'0:0').split(':')[0],10) || 0;
      const block = Math.min(numBlocks-1, Math.max(0, Math.floor(h/interval)));
      if(sums[e.person]) sums[e.person][block] += e.amount;
    });
    return {sums, numBlocks};
  }

  function renderIntervalPills(){
    const wrap = document.getElementById('intervalPills');
    wrap.innerHTML = INTERVAL_OPTIONS.map(h=>
      `<button class="${avgIntervalHours===h?'active':''}" data-h="${h}">${h}h</button>`
    ).join('');
    wrap.querySelectorAll('button').forEach(b=>{
      b.addEventListener('click', ()=>{
        avgIntervalHours = parseInt(b.dataset.h,10);
        renderIntervalPills();
        renderAvgCard();
      });
    });
  }

  function renderAvgCard(){
    const wrap = document.getElementById('avgCard');
    const numBlocks = 24/avgIntervalHours;
    const stats = ['p1','p2'].map(p=>{
      const daysSeen = new Set();
      let total = 0;
      state.entries.forEach(e=>{
        if(e.person===p){ total += e.amount; daysSeen.add(e.date); }
      });
      const dayCount = Math.max(1, daysSeen.size);
      const dailyAvg = total/dayCount;
      const perInterval = Math.round(dailyAvg/numBlocks);
      return `
        <div class="avg-stat ${p}">
          <div class="avg-name"><span class="dot"></span>${escapeHtml(state.names[p])}</div>
          <div class="avg-value">${perInterval}<span> ml</span></div>
          <div class="avg-sub">${t('avgPerSuffix',{h:avgIntervalHours})}${daysSeen.size>1?t('daysSuffix',{n:daysSeen.size}):''}</div>
        </div>
      `;
    }).join('');
    wrap.innerHTML = stats;
  }

  const LOCALE_MAP = {en:'en-US', hi:'hi-IN', gu:'gu-IN'};

  function formatDateLabel(dateStr){
    const today = todayStr();
    if(dateStr === today) return t('todayLabel');
    const d = new Date(dateStr+'T00:00:00');
    const yest = new Date();
    yest.setDate(yest.getDate()-1);
    const yestStr = yest.getFullYear()+'-'+String(yest.getMonth()+1).padStart(2,'0')+'-'+String(yest.getDate()).padStart(2,'0');
    if(dateStr === yestStr) return t('yesterdayLabel');
    return d.toLocaleDateString(LOCALE_MAP[currentLang]||'en-US', {weekday:'short', month:'short', day:'numeric'});
  }

  function renderDateSelect(){
    const sel = document.getElementById('dateSelect');
    const today = todayStr();
    const dates = new Set([today]);
    state.entries.forEach(e=> dates.add(e.date));
    const sorted = Array.from(dates).sort().reverse();
    if(!selectedDate || !dates.has(selectedDate)) selectedDate = today;

    sel.innerHTML = sorted.map(d=>
      `<option value="${d}" ${d===selectedDate?'selected':''}>${formatDateLabel(d)}</option>`
    ).join('');
    sel.onchange = ()=>{ selectedDate = sel.value; renderPatterns(); };
  }

  function renderPatterns(){
    const grid = document.getElementById('patternGrid');
    const note = document.getElementById('patternNote');
    const date = selectedDate || todayStr();
    const {sums, numBlocks} = computeBlockTotals(date, 2);
    note.textContent = t('totalMlLogged', {date: formatDateLabel(date)});

    grid.innerHTML = Array.from({length:numBlocks}).map((_,i)=>{
      const a1 = sums.p1[i], a2 = sums.p2[i];
      return `
        <div class="pattern-card">
          <div class="pattern-time">${blockLabel(i, 2)}</div>
          <div class="pattern-stat p1 ${a1===0?'zero':''}"><span class="dot"></span>${a1} ml</div>
          <div class="pattern-stat p2 ${a2===0?'zero':''}"><span class="dot"></span>${a2} ml</div>
        </div>
      `;
    }).join('');
  }

  function addEntry(amount){
    const e = {
      id: Date.now().toString(36)+Math.random().toString(36).slice(2,7),
      person: state.active,
      amount: amount,
      date: todayStr(),
      time: nowHHMM()
    };
    state.entries.push(e);
    apiAddEntry(e);
    render();
  }

  let editingId = null;
  function openEditSheet(id){
    const e = state.entries.find(x=>x.id===id);
    if(!e) return;
    editingId = id;
    document.getElementById('editAmount').value = e.amount;
    document.getElementById('editTime').value = e.time;
    document.getElementById('sheetOverlay').classList.add('show');
  }
  function closeSheet(){
    document.getElementById('sheetOverlay').classList.remove('show');
    editingId = null;
  }

  function openColorSheet(p){
    colorEditingPerson = p;
    document.getElementById('colorSheetTitle').textContent = t('colourFor', {name: state.names[p]});
    renderSwatchGrid(p);
    document.getElementById('colorSheetOverlay').classList.add('show');
  }
  function closeColorSheet(){
    document.getElementById('colorSheetOverlay').classList.remove('show');
    colorEditingPerson = null;
  }
  function renderSwatchGrid(p){
    const grid = document.getElementById('swatchGrid');
    grid.innerHTML = Object.keys(THEME_COLORS).map(key=>{
      const c = THEME_COLORS[key];
      const active = state.colors[p] === key;
      return `<button class="swatch ${active?'active':''}" data-color="${key}" style="background:${c.base}" aria-label="${key}"></button>`;
    }).join('');
    grid.querySelectorAll('.swatch').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const color = btn.dataset.color;
        state.colors[colorEditingPerson] = color;
        applyColors();
        apiSetColor(colorEditingPerson, color);
        closeColorSheet();
        render();
      });
    });
  }
  document.getElementById('cancelColor').addEventListener('click', closeColorSheet);
  document.getElementById('colorSheetOverlay').addEventListener('click', (ev)=>{
    if(ev.target.id === 'colorSheetOverlay') closeColorSheet();
  });

  document.getElementById('cancelEdit').addEventListener('click', closeSheet);
  document.getElementById('sheetOverlay').addEventListener('click', (ev)=>{
    if(ev.target.id === 'sheetOverlay') closeSheet();
  });
  document.getElementById('saveEdit').addEventListener('click', ()=>{
    if(!editingId) return;
    const e = state.entries.find(x=>x.id===editingId);
    if(!e) return;
    const amt = parseInt(document.getElementById('editAmount').value,10);
    const time = document.getElementById('editTime').value;
    if(amt && amt>0) e.amount = amt;
    if(time) e.time = time;
    apiEditEntry(e.id, e.amount, e.time);
    closeSheet();
    render();
  });
  document.getElementById('deleteEntry').addEventListener('click', ()=>{
    if(!editingId) return;
    const id = editingId;
    state.entries = state.entries.filter(x=>x.id!==id);
    apiDeleteEntry(id);
    closeSheet();
    render();
  });

  document.getElementById('customAmount').addEventListener('keydown', (ev)=>{
    if(ev.key==='Enter'){ document.getElementById('customAddBtn').click(); }
  });

  function setupPager(){
    const pager = document.getElementById('pager');
    const dots = Array.from(document.querySelectorAll('.dot-btn'));
    dots.forEach(d=>{
      d.addEventListener('click', ()=>{
        const i = parseInt(d.dataset.i,10);
        pager.scrollTo({top: i*pager.clientHeight, behavior:'smooth'});
      });
    });
    let scrollTimeout;
    pager.addEventListener('scroll', ()=>{
      clearTimeout(scrollTimeout);
      scrollTimeout = setTimeout(()=>{
        const i = Math.round(pager.scrollTop / pager.clientHeight);
        dots.forEach((d,idx)=> d.classList.toggle('active', idx===i));
      }, 50);
    });
  }

  function render(){
    renderSegment();
    renderGlasses();
    renderQuickgrid();
    renderLog();
    renderIntervalPills();
    renderAvgCard();
    renderDateSelect();
    renderPatterns();
  }

  applyStaticTranslations();
  setupLangSelect();
  setupInstallBanner();
  setupPager();
  loadAll();
})();
</script>
</body>
</html>
